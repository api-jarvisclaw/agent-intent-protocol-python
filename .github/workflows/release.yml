name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Trigger by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Project name:      agent-intent-protocol
#   Owner:             api-jarvisclaw
#   Repository name:   agent-intent-protocol-python
#   Workflow name:     release.yml
#   Environment name:  pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
