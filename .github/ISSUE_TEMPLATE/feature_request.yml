name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches welcome.
    validations:
      required: true
  - type: dropdown
    id: protocol-impact
    attributes:
      label: Does this affect the wire protocol?
      description: >
        Changes to the intent format or AIR/1 receipts must track the
        Agent Intent Protocol spec. Pick "not sure" if you're unsure.
      options:
        - "No — client-side only"
        - "Yes — needs a protocol/spec change"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
