name: Bug report
description: Report something that isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues (signing, payments, key
        handling), do not file a public issue — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal snippet or steps. Redact any private keys.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `pip show agent-intent-x402`.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste any error output. Redact secrets.
      render: shell
