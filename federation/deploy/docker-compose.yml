# Two independent AIR/1 federation nodes, each pinned to a DIFFERENT Base RPC
# operator. Point a receipt at both and compare verdicts: agreement across two
# operators run by different parties is the "trust nobody" evidence the AIR/1
# IETF submission calls for.
#
#   docker compose -f deploy/docker-compose.yml up --build
#   curl -s localhost:8081/health
#   curl -s localhost:8082/health
#
# Build context is the federation package root (one level up), so both the
# verifier package and deploy/server.py are available to the image.
services:
  node-a:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: air-federation-node:latest
    environment:
      AIR_NODE_NAME: node-a-drpc
      AIR_NODE_RPC: https://base.drpc.org
      AIR_NODE_PORT: "8080"
    ports:
      - "8081:8080"
    restart: unless-stopped

  node-b:
    # Reuse the image built by node-a; only the RPC operator differs.
    image: air-federation-node:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      AIR_NODE_NAME: node-b-publicnode
      AIR_NODE_RPC: https://base-rpc.publicnode.com
      AIR_NODE_PORT: "8080"
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      - node-a
